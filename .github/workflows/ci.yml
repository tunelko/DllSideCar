name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
  schedule:
    # Re-run weekly so vulnerable-package and dependency-audit signals pick up new advisories.
    - cron: '0 6 * * 1'

permissions:
  contents: read

# Dedup: a push to develop (or any PR-targeted branch) AND the corresponding
# pull_request synchronize event normally fire two parallel runs. The key
# `head_ref || ref_name` collapses them into the same group — push uses
# ref_name (e.g. "develop"), pull_request uses head_ref (the PR's source
# branch, also "develop" for develop→main PRs). cancel-in-progress lets the
# later trigger (typically the pull_request run) cancel the earlier push run,
# so only one full set of checks completes per logical change.
concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION: 'DllSidecar.sln'
  TEST_PROJECT: 'DllSidecar.Core.Tests/DllSidecar.Core.Tests.csproj'

jobs:
  build-test:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx

  dependency-audit:
    name: NuGet Vulnerability Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Scan vulnerable packages (direct + transitive)
        shell: pwsh
        run: |
          $output = dotnet list ${{ env.SOLUTION }} package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match 'has the following vulnerable packages') {
              Write-Error "Vulnerable NuGet packages detected — see log above."
              exit 1
          }
          Write-Host "OK: no vulnerable packages reported."

      - name: Scan deprecated packages (informational)
        shell: pwsh
        run: |
          $output = dotnet list ${{ env.SOLUTION }} package --deprecated 2>&1 | Out-String
          Write-Host $output

  static-analysis:
    name: Static Analysis (Roslyn + SecurityCodeScan)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      # Directory.Build.props injects SecurityCodeScan + .editorconfig promotes
      # security rules (CA21xx/CA53xx/SCS00xx) to error severity, so a clean
      # build is the gate. /p:TreatWarningsAsErrors=false keeps unrelated
      # warnings non-fatal — only the explicitly-elevated rules fail CI.
      - name: Build with analyzers
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore /p:RunAnalyzersDuringBuild=true /p:EnforceCodeStyleInBuild=true

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
